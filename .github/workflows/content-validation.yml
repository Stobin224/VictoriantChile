name: Content Validation

on:
  pull_request:
    paths:
      - 'Assets/StreamingAssets/content/**'
      - 'scripts/validate_content.py'
      - 'scripts/smoke_simulation.py'
      - 'scripts/content_hash.py'
      - 'scripts/verify_manifest_hashes.py'
      - 'scripts/check_manifest_bump.py'
      - '.github/workflows/content-validation.yml'
  push:
    paths:
      - 'Assets/StreamingAssets/content/**'
      - 'scripts/validate_content.py'
      - 'scripts/smoke_simulation.py'
      - 'scripts/content_hash.py'
      - 'scripts/verify_manifest_hashes.py'
      - 'scripts/check_manifest_bump.py'
      - '.github/workflows/content-validation.yml'

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enforce manifest bump policy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${{ github.sha }}^"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            BASE_SHA="$HEAD_SHA^"
          fi

          echo "Checking manifest policy between $BASE_SHA...$HEAD_SHA"
          python3 scripts/check_manifest_bump.py --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Validate JSON syntax
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path("Assets/StreamingAssets/content").rglob("*.json")):
              with path.open("r", encoding="utf-8") as f:
                  json.load(f)
          PY

      - name: Verify manifest hashes
        run: python3 scripts/verify_manifest_hashes.py

      - name: Validate semantic content
        run: python3 scripts/validate_content.py

      - name: Smoke simulation
        run: python3 scripts/smoke_simulation.py
